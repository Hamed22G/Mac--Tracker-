<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>McDonald's Shift Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="hero">
      <div>
        <p class="badge">🍔 Work Dashboard</p>
        <h1>McDonald's Shift Tracker</h1>
        <p class="subtitle">Track your workdays, hours, salary estimate, and upcoming shifts.</p>
      </div>
      <button class="clear-btn" onclick="clearAll()">Reset</button>
    </section>

    <section class="stats">
      <article class="stat-card">
        <p>Total Hours</p>
        <h2 id="totalHours">0</h2>
      </article>
      <article class="stat-card">
        <p>Estimated Salary</p>
        <h2 id="salary">€0</h2>
      </article>
      <article class="stat-card">
        <p>Total Shifts</p>
        <h2 id="totalShifts">0</h2>
      </article>
      <article class="stat-card highlight">
        <p>Next Shift</p>
        <h2 id="nextShift">None</h2>
      </article>
    </section>

    <section class="panel">
      <h2>Add a Shift</h2>
      <div class="form-grid">
        <label>Date
          <input type="date" id="date" />
        </label>
        <label>Start time
          <input type="time" id="start" />
        </label>
        <label>End time
          <input type="time" id="end" />
        </label>
        <label>Position / Place
          <input type="text" id="position" placeholder="MPS, DRA, KAS..." />
        </label>
      </div>
      <button class="main-btn" onclick="addShift()">Add Shift</button>
    </section>

    <section class="panel">
      <div class="panel-top">
        <h2>Your Shifts</h2>
        <p id="monthTotal">This month: 0 hours</p>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Day</th>
              <th>Start</th>
              <th>End</th>
              <th>Position</th>
              <th>Hours</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="shiftTable"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
